</head>
<body>
<div class="content">
  <div class="diagram-col">
    <img src="diagram-user-llm.png" style="width: 100%; height: auto;">

  <div class="screenshot-col">
    <div style="border: 2px solid #000000;">
      <img src="chatgpt-conversation.png" style="width: 266pt; height: auto; display: block;">

  </div>

</html>
