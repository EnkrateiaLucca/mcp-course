<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>MCP Resources Chat Demo</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         margin: 0; display: flex; height: 100vh; background: #f6f6f7; color: #222; }
  #sidebar { width: 320px; border-right: 1px solid #e3e3e6; padding: 20px;
             overflow-y: auto; background: white; }
  #sidebar h3 { margin: 0 0 4px; }
  #sidebar small { color: #777; display: block; margin-bottom: 14px; }
  .res { padding: 10px; border: 1px solid #e3e3e6; border-radius: 8px;
         margin-bottom: 8px; cursor: pointer; }
  .res:hover { background: #fafafa; }
  .res .uri { font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
              font-size: 11px; color: #888; }
  .res .desc { font-size: 12px; color: #555; margin-top: 4px; }
  #main { flex: 1; display: flex; flex-direction: column; }
  #log { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
  .msg { margin: 6px 0; padding: 10px 14px; border-radius: 12px;
         max-width: 75%; white-space: pre-wrap; line-height: 1.4; }
  .user { background: #2563eb; color: white; align-self: flex-end; }
  .assistant { background: white; border: 1px solid #e3e3e6; align-self: flex-start; }
  #input-row { display: flex; padding: 14px; border-top: 1px solid #e3e3e6; background: white; }
  #input { flex: 1; padding: 10px 12px; font-size: 14px; border: 1px solid #d0d0d4;
           border-radius: 8px; outline: none; }
  #input:focus { border-color: #2563eb; }
  button { padding: 10px 18px; margin-left: 10px; cursor: pointer;
           background: #2563eb; color: white; border: none; border-radius: 8px;
           font-weight: 600; }
  button:disabled { opacity: 0.5; cursor: wait; }
</style>
</head>
<body>
  <div id="sidebar">
    <h3>MCP Resources</h3>
    <small>Check the resources you want the assistant to use as context.</small>
    <div id="resources">loading…</div>
  </div>
  <div id="main">
    <div id="log"></div>
    <div id="input-row">
      <input id="input" placeholder="Ask about Acme Corp…" autofocus />
      <button id="send" onclick="send()">Send</button>
    </div>
  </div>

<script>
async function loadResources() {
  const r = await fetch('/resources').then(r => r.json());
  document.getElementById('resources').innerHTML = r.map(x => `
    <label class="res">
      <input type="checkbox" value="${x.uri}" checked>
      <strong>${x.name}</strong>
      <div class="uri">${x.uri}</div>
      <div class="desc">${x.description}</div>
    </label>
  `).join('');
}

function addMsg(role, text) {
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.textContent = text;
  document.getElementById('log').appendChild(d);
  d.scrollIntoView({ behavior: 'smooth' });
}

async function send() {
  const inp = document.getElementById('input');
  const btn = document.getElementById('send');
  const msg = inp.value.trim();
  if (!msg) return;
  inp.value = '';
  addMsg('user', msg);
  btn.disabled = true;
  const selected = Array.from(
    document.querySelectorAll('#resources input:checked')
  ).map(c => c.value);
  try {
    const r = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, resources: selected }),
    }).then(r => r.json());
    addMsg('assistant', r.reply);
  } catch (e) {
    addMsg('assistant', '[error] ' + e);
  } finally {
    btn.disabled = false;
    inp.focus();
  }
}

document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter') send();
});

loadResources();
</script>
</body>
</html>
