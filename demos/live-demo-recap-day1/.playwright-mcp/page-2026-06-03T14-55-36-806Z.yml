            - heading "Course outcomes" [level=3] [ref=e457]
            - list [ref=e458]:
              - listitem [ref=e459]: Create simple agents that can leverage tools powered by MCP
              - listitem [ref=e460]: Build fully functional MCP servers that connect LLMs to external data sources and tools
              - listitem [ref=e461]: Design and implement AI workflows that use MCP to provide context-aware responses
              - listitem [ref=e462]: Create agents with Claude Agents SDK that can use MCP tools to perform tasks
            - heading "Course description" [level=3] [ref=e463]
            - paragraph [ref=e464]: The Model Context Protocol (MCP) is an open protocol that standardizes how AI applications connect to data sources and tools. Think of it as a USB-C port for AI—a universal connector that lets large language models seamlessly integrate with external systems.
            - paragraph [ref=e465]: Join expert Lucas Soares to learn how to build MCP servers that expose tools, resources, and prompts to LLMs like Claude. You’ll explore how to create AI workflows that leverage external context and tools through MCP, enabling more powerful and context-aware AI assistants. Through practical examples, you’ll build agents that can leverage MCP servers for file systems and have the ability to leverage APIs using the Claude Agents SDK. By the end of the course, you’ll have the skills to build sophisticated AI-augmented workflows that connect LLMs to the data and tools they need to be truly useful.
          - generic [ref=e466]:
