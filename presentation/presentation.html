    # Module 02 — The Agent SDK *is* an MCP host

    ---

    # The loop disappears

    ```python
    options = ClaudeAgentOptions(
        system_prompt=SYSTEM_PROMPT,
        mcp_servers={"research": {"command": "uv",
                                   "args": ["run", "mcp_server.py"]}},
        allowed_tools=["mcp__research__*"],
    )
    async for message in query(prompt=user_prompt, options=options):
        ...
    ```

    --

    ## Demo 00: ~70 lines → Demo 02: ~15 lines. Same behavior, plus context management, permissions, hooks, sessions.

    ---

    # Pattern 2: in-process servers

    ```python
    from claude_agent_sdk import create_sdk_mcp_server, tool

    @tool("web_search", "Search the web.", {"query": str})
    async def web_search(args): ...

    server = create_sdk_mcp_server(name="research", tools=[web_search])
    options = ClaudeAgentOptions(mcp_servers={"research": server})
    ```

    --

    ## External server → reusable by every host. In-process → single artifact, serverless-friendly.

    # Module 04 — Production shape

    ---

    # Four production moves
    ### (from Anthropic's *"Building agents that reach production systems with MCP"*, updated Apr 2026)

    1. **Intent-grouped tools, not API mirrors** — 7 primitives → 3 tools, one round-trip per task

    2. **Remote transport** — `streamable-http`, cloud-reachable

    3. **An auth seam** — bearer today, OAuth where it slots in

    4. **Hooks + permissions + evals** — control, observability, correctness

    ---

    # The auth ladder

    ## 1. Nothing — demos only

    ## 2. Static bearer token ← *our demo (the wiring is real)*

    ## 3. **OAuth 2.1** — server as resource server, clients register via **CIMD** (Client ID Metadata Documents)

    --

    ### The seam is the lesson: swap 2 → 3 without touching a single tool.

    ### ~~Wrap your agent in FastAPI~~

    ## Deploy the **MCP server itself.**
    ### One remote server → Claude, Claude Code, Cursor, ChatGPT all connect to it

    ---

    # Stateless by construction

    ```python
    mcp = FastMCP("research-explorer",
                  stateless_http=True,    # any replica serves any request
                  json_response=True)     # serverless-friendly

    app = mcp.streamable_http_app()       # ← this IS the web app
    ```

    --

    ## No FastAPI, no SSE plumbing. And the 2026-07-28 spec makes the *protocol core* stateless too.

    # MCP Apps
    ## *(first official MCP extension — Jan 2026)*

    ### Tools that render **interactive UIs inside the chat** — sandboxed iframe, postMessage bridge

    ---

    # An App = a tool + a resource, linked by `_meta`

    ```python
    @mcp.tool(meta={"ui": {"resourceUri": "ui://explorer/app.html"}})
    def research_explorer(topic: str) -> dict: ...

    @mcp.resource("ui://explorer/app.html",
                  mime_type="text/html;profile=mcp-app")
    def app_html() -> str: ...
    ```

    --

    ## Two primitives you already know. The host does the sandboxing.

    # What lands July 28, 2026

    ## The largest spec revision since launch

    ---

    # 2026-07-28 in four bullets

    - **Stateless core** — no `initialize` handshake, no session header; plain load balancers *(module 05 already lives this way)*

    - **Extensions framework** — MCP Apps and Tasks become official opt-in extensions

    - **Multi round-trip requests** — tools can ask for input mid-call

    - **Deprecations** — roots, sampling, logging *(12-month sunset — don't build new work on them)*

    --

    ### SDK v2 tracks this (FastMCP → `MCPServer`). Pin v1 until you migrate deliberately.
