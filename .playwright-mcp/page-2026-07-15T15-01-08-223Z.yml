  - generic [ref=e52]:
    - main [ref=e53]:
      - article [ref=e54]:
        - 'heading "Code Mode: the better way to use MCP" [level=1] [ref=e55]'
        - paragraph [ref=e56]: 2025-09-26
        - list [ref=e57]:
          - listitem [ref=e58]:
            - link [ref=e59] [cursor=pointer]:
              - /url: /author/kenton-varda/
              - img "Kenton Varda" [ref=e60]
            - link "Kenton Varda" [ref=e62] [cursor=pointer]:
              - /url: /author/kenton-varda/
          - listitem [ref=e63]:
            - link [ref=e64] [cursor=pointer]:
              - /url: /author/sunil/
              - img "Sunil Pai" [ref=e65]
            - link "Sunil Pai" [ref=e67] [cursor=pointer]:
              - /url: /author/sunil/
        - generic [ref=e68]:
          - generic [ref=e69]: 9 min read
          - generic [ref=e70]:
            - paragraph [ref=e71]: It turns out we've all been using MCP wrong.
            - paragraph [ref=e72]:
              - text: Most agents today use MCP by directly exposing the "tools" to the
              - link "LLM" [ref=e73] [cursor=pointer]:
                - /url: https://www.cloudflare.com/learning/ai/what-is-large-language-model/
              - text: .
            - paragraph [ref=e74]: "We tried something different: Convert the MCP tools into a TypeScript API, and then ask an LLM to write code that calls that API."
            - paragraph [ref=e75]: "The results are striking:"
            - list [ref=e76]:
              - listitem [ref=e77]:
                - paragraph [ref=e78]: We found agents are able to handle many more tools, and more complex tools, when those tools are presented as a TypeScript API rather than directly. Perhaps this is because LLMs have an enormous amount of real-world TypeScript in their training set, but only a small set of contrived examples of tool calls.
              - listitem [ref=e79]:
                - paragraph [ref=e80]: The approach really shines when an agent needs to string together multiple calls. With the traditional approach, the output of each tool call must feed into the LLM's neural network, just to be copied over to the inputs of the next call, wasting time, energy, and tokens. When the LLM can write code, it can skip all that, and only read back the final results it needs.
            - paragraph [ref=e81]: In short, LLMs are better at writing code to call MCP, than at calling MCP directly.
            - generic [ref=e82]:
              - heading "What's MCP?" [level=2] [ref=e83]
              - link [ref=e84] [cursor=pointer]:
                - /url: "#whats-mcp"
            - paragraph [ref=e87]:
              - text: "For those that aren't familiar:"
              - link "Model Context Protocol" [ref=e88] [cursor=pointer]:
                - /url: https://modelcontextprotocol.io/docs/getting-started/intro
              - text: is a standard protocol for giving AI agents access to external tools, so that they can directly perform work, rather than just chat with you.
            - paragraph [ref=e89]: "Seen another way, MCP is a uniform way to:"
            - list [ref=e90]:
              - listitem [ref=e91]:
                - paragraph [ref=e92]: expose an API for doing something,
              - listitem [ref=e93]:
                - paragraph [ref=e94]: along with documentation needed for an LLM to understand it,
              - listitem [ref=e95]:
                - paragraph [ref=e96]: with authorization handled out-of-band.
            - paragraph [ref=e97]: MCP has been making waves throughout 2025 as it has suddenly greatly expanded the capabilities of AI agents.
            - paragraph [ref=e98]:
              - text: The "API" exposed by an MCP server is expressed as a set of "tools". Each tool is essentially a remote procedure call (RPC) function – it is called with some parameters and returns a response. Most modern LLMs have
              - link "the capability to use \"tools\" (sometimes called \"function calling\")" [ref=e99] [cursor=pointer]:
                - /url: https://developers.cloudflare.com/workers-ai/features/function-calling/
              - text: ", meaning they are trained to output text in a certain format when they want to invoke a tool. The program invoking the LLM sees this format and invokes the tool as specified, then feeds the results back into the LLM as input."
            - generic [ref=e100]:
              - heading "Anatomy of a tool call" [level=3] [ref=e101]
              - link [ref=e102] [cursor=pointer]:
                - /url: "#anatomy-of-a-tool-call"
            - paragraph [ref=e105]: Under the hood, an LLM generates a stream of "tokens" representing its output. A token might represent a word, a syllable, some sort of punctuation, or some other component of text.
            - paragraph [ref=e106]: A tool call, though, involves a token that does not have any textual equivalent. The LLM is trained (or, more often, fine-tuned) to understand a special token that it can output that means "the following should be interpreted as a tool call," and another special token that means "this is the end of the tool call." Between these two tokens, the LLM will typically write tokens corresponding to some sort of JSON message that describes the call.
            - paragraph [ref=e107]:
              - text: For instance, imagine you have connected an agent to an MCP server that provides weather info, and you then ask the agent what the weather is like in Austin, TX. Under the hood, the LLM might generate output like the following. Note that here we've used words in
              - code [ref=e108]: <|
              - text: and
              - code [ref=e109]: "|>"
              - text: to represent our special tokens, but in fact, these tokens do not represent text at all; this is just for illustration.
            - paragraph [ref=e110]: I will use the Weather MCP server to find out the weather in Austin, TX.
            - code [ref=e112]: "I will use the Weather MCP server to find out the weather in Austin, TX. <|tool_call|> { \"name\": \"get_current_weather\", \"arguments\": { \"location\": \"Austin, TX, USA\" } } <|end_tool_call|>"
            - paragraph [ref=e113]: "Upon seeing these special tokens in the output, the LLM's harness will interpret the sequence as a tool call. After seeing the end token, the harness pauses execution of the LLM. It parses the JSON message and returns it as a separate component of the structured API result. The agent calling the LLM API sees the tool call, invokes the relevant MCP server, and then sends the results back to the LLM API. The LLM's harness will then use another set of special tokens to feed the result back into the LLM:"
            - code [ref=e115]: "<|tool_result|> { \"location\": \"Austin, TX, USA\", \"temperature\": 93, \"unit\": \"fahrenheit\", \"conditions\": \"sunny\" } <|end_tool_result|>"
            - paragraph [ref=e116]: The LLM reads these tokens in exactly the same way it would read input from the user – except that the user cannot produce these special tokens, so the LLM knows it is the result of the tool call. The LLM then continues generating output like normal.
            - paragraph [ref=e117]: Different LLMs may use different formats for tool calling, but this is the basic idea.
            - generic [ref=e118]:
              - heading "What's wrong with this?" [level=3] [ref=e119]
              - link [ref=e120] [cursor=pointer]:
                - /url: "#whats-wrong-with-this"
            - paragraph [ref=e123]: The special tokens used in tool calls are things LLMs have never seen in the wild. They must be specially trained to use tools, based on synthetic training data. They aren't always that good at it. If you present an LLM with too many tools, or overly complex tools, it may struggle to choose the right one or to use it correctly. As a result, MCP server designers are encouraged to present greatly simplified APIs as compared to the more traditional API they might expose to developers.
            - paragraph [ref=e124]: Meanwhile, LLMs are getting really good at writing code. In fact, LLMs asked to write code against the full, complex APIs normally exposed to developers don't seem to have too much trouble with it. Why, then, do MCP interfaces have to "dumb it down"? Writing code and calling tools are almost the same thing, but it seems like LLMs can do one much better than the other?
            - paragraph [ref=e125]: "The answer is simple: LLMs have seen a lot of code. They have not seen a lot of \"tool calls\". In fact, the tool calls they have seen are probably limited to a contrived training set constructed by the LLM's own developers, in order to try to train it. Whereas they have seen real-world code from millions of open source projects."
            - paragraph [ref=e126]:
              - generic [ref=e127]: Making an LLM perform tasks with tool calling is like putting Shakespeare through a month-long class in Mandarin and then asking him to write a play in it. It's just not going to be his best work.
            - generic [ref=e128]:
              - heading "But MCP is still useful, because it is uniform" [level=3] [ref=e129]
              - link [ref=e130] [cursor=pointer]:
                - /url: "#but-mcp-is-still-useful-because-it-is-uniform"
            - paragraph [ref=e133]: MCP is designed for tool-calling, but it doesn't actually have to be used that way.
            - paragraph [ref=e134]: The "tools" that an MCP server exposes are really just an RPC interface with attached documentation. We don't really have to present them as tools. We can take the tools, and turn them into a programming language API instead.
            - paragraph [ref=e135]: But why would we do that, when the programming language APIs already exist independently? Almost every MCP server is just a wrapper around an existing traditional API – why not expose those APIs?
            - paragraph [ref=e136]: "Well, it turns out MCP does something else that's really useful: It provides a uniform way to connect to and learn about an API."
            - paragraph [ref=e137]: An AI agent can use an MCP server even if the agent's developers never heard of the particular MCP server, and the MCP server's developers never heard of the particular agent. This has rarely been true of traditional APIs in the past. Usually, the client developer always knows exactly what API they are coding for. As a result, every API is able to do things like basic connectivity, authorization, and documentation a little bit differently.
            - paragraph [ref=e138]: This uniformity is useful even when the AI agent is writing code. We'd like the AI agent to run in a sandbox such that it can only access the tools we give it. MCP makes it possible for the agentic framework to implement this, by handling connectivity and authorization in a standard way, independent of the AI code. We also don't want the AI to have to search the Internet for documentation; MCP provides it directly in the protocol.
            - generic [ref=e139]:
              - heading "OK, how does it work?" [level=2] [ref=e140]
              - link [ref=e141] [cursor=pointer]:
                - /url: "#ok-how-does-it-work"
            - paragraph [ref=e144]:
              - text: We have already extended the
              - link "Cloudflare Agents SDK" [ref=e145] [cursor=pointer]:
                - /url: https://developers.cloudflare.com/agents/
              - text: to support this new model!
            - paragraph [ref=e146]: "For example, say you have an app built with ai-sdk that looks like this:"
            - code [ref=e148]: "const stream = streamText({ model: openai(\"gpt-5\"), system: \"You are a helpful assistant\", messages: [ { role: \"user\", content: \"Write a function that adds two numbers\" } ], tools: { // tool definitions } })"
            - paragraph [ref=e149]: "You can wrap the tools and prompt with the codemode helper, and use them in your app:"
            - code [ref=e151]: "import { codemode } from \"agents/codemode/ai\"; const {system, tools} = codemode({ system: \"You are a helpful assistant\", tools: { // tool definitions }, // ...config }) const stream = streamText({ model: openai(\"gpt-5\"), system, tools, messages: [ { role: \"user\", content: \"Write a function that adds two numbers\" } ] })"
            - paragraph [ref=e152]:
              - text: With this change, your app will now start generating and running code that itself will make calls to the tools you defined, MCP servers included. We will introduce variants for other libraries in the very near future.
              - link "Read the docs" [ref=e153] [cursor=pointer]:
                - /url: https://github.com/cloudflare/agents/blob/main/docs/codemode.md
              - text: for more details and examples.
            - generic [ref=e154]:
              - heading "Converting MCP to TypeScript" [level=3] [ref=e155]
              - link [ref=e156] [cursor=pointer]:
                - /url: "#converting-mcp-to-typescript"
            - paragraph [ref=e159]: When you connect to an MCP server in "code mode", the Agents SDK will fetch the MCP server's schema, and then convert it into a TypeScript API, complete with doc comments based on the schema.
            - paragraph [ref=e160]:
              - text: For example, connecting to the MCP server at
              - link "https://gitmcp.io/cloudflare/agents" [ref=e161] [cursor=pointer]:
                - /url: https://gitmcp.io/cloudflare/agents
              - text: ", will generate a TypeScript definition like this:"
            - code [ref=e163]:
              - text: "interface FetchAgentsDocumentationInput { [k: string]: unknown; } interface FetchAgentsDocumentationOutput { [key: string]: any; } interface SearchAgentsDocumentationInput { /** * The search query to find relevant documentation */ query: string; } interface SearchAgentsDocumentationOutput { [key: string]: any; } interface SearchAgentsCodeInput { /** * The search query to find relevant code files */ query: string; /** * Page number to retrieve (starting from 1). Each page contains 30 * results. */ page?: number; } interface SearchAgentsCodeOutput { [key: string]: any; } interface FetchGenericUrlContentInput { /** * The URL of the document or page to fetch */ url: string; } interface FetchGenericUrlContentOutput { [key: string]: any; } declare const codemode: { /** * Fetch entire documentation file from GitHub repository: * cloudflare/agents. Useful for general questions. Always call * this tool first if asked about cloudflare/agents. */ fetch_agents_documentation:"
              - generic [ref=e164]:
                - text: (
                - generic [ref=e165]: "input: FetchAgentsDocumentationInput"
                - text: ) =>
              - text: "Promise<FetchAgentsDocumentationOutput>; /** * Semantically search within the fetched documentation from * GitHub repository: cloudflare/agents. Useful for specific queries. */ search_agents_documentation:"
              - generic [ref=e166]:
                - text: (
                - generic [ref=e167]: "input: SearchAgentsDocumentationInput"
                - text: ) =>
              - text: "Promise<SearchAgentsDocumentationOutput>; /** * Search for code within the GitHub repository: \"cloudflare/agents\" * using the GitHub Search API (exact match). Returns matching files * for you to query further if relevant. */ search_agents_code:"
              - generic [ref=e168]:
                - text: (
                - generic [ref=e169]: "input: SearchAgentsCodeInput"
                - text: ) =>
              - text: "Promise<SearchAgentsCodeOutput>; /** * Generic tool to fetch content from any absolute URL, respecting * robots.txt rules. Use this to retrieve referenced urls (absolute * urls) that were mentioned in previously fetched documentation. */ fetch_generic_url_content:"
              - generic [ref=e170]:
                - text: (
                - generic [ref=e171]: "input: FetchGenericUrlContentInput"
                - text: ) =>
              - text: "Promise<FetchGenericUrlContentOutput>; };"
            - paragraph [ref=e172]: This TypeScript is then loaded into the agent's context. Currently, the entire API is loaded, but future improvements could allow an agent to search and browse the API more dynamically – much like an agentic coding assistant would.
            - generic [ref=e173]:
              - heading "Running code in a sandbox" [level=3] [ref=e174]
              - link [ref=e175] [cursor=pointer]:
                - /url: "#running-code-in-a-sandbox"
            - paragraph [ref=e178]: Instead of being presented with all the tools of all the connected MCP servers, our agent is presented with just one tool, which simply executes some TypeScript code.
            - paragraph [ref=e179]: The code is then executed in a secure sandbox. The sandbox is totally isolated from the Internet. Its only access to the outside world is through the TypeScript APIs representing its connected MCP servers.
            - paragraph [ref=e180]: These APIs are backed by RPC invocation which calls back to the agent loop. There, the Agents SDK dispatches the call to the appropriate MCP server.
            - paragraph [ref=e181]:
              - text: "The sandboxed code returns results to the agent in the obvious way: by invoking"
              - code [ref=e182]: console.log()
              - text: . When the script finishes, all the output logs are passed back to the agent.
            - figure [ref=e183]
            - generic [ref=e184]:
              - 'heading "Dynamic Worker loading: no containers here" [level=2] [ref=e185]'
              - link [ref=e186] [cursor=pointer]:
                - /url: "#dynamic-worker-loading-no-containers-here"
            - paragraph [ref=e189]: This new approach requires access to a secure sandbox where arbitrary code can run. So where do we find one? Do we have to run containers? Is that expensive?
            - paragraph [ref=e190]: "No. There are no containers. We have something much better: isolates."
            - paragraph [ref=e191]:
              - text: The Cloudflare Workers platform has always been based on V8 isolates, that is, isolated JavaScript runtimes powered by the
              - link "V8 JavaScript engine" [ref=e192] [cursor=pointer]:
                - /url: https://v8.dev/
              - text: .
            - paragraph [ref=e193]: Isolates are far more lightweight than containers. An isolate can start in a handful of milliseconds using only a few megabytes of memory.
            - paragraph [ref=e194]: Isolates are so fast that we can just create a new one for every piece of code the agent runs. There's no need to reuse them. There's no need to prewarm them. Just create it, on demand, run the code, and throw it away. It all happens so fast that the overhead is negligible; it's almost as if you were just eval()ing the code directly. But with security.
            - generic [ref=e195]:
              - heading "The Worker Loader API" [level=3] [ref=e196]
              - link [ref=e197] [cursor=pointer]:
                - /url: "#the-worker-loader-api"
            - paragraph [ref=e200]: Until now, though, there was no way for a Worker to directly load an isolate containing arbitrary code. All Worker code instead had to be uploaded via the Cloudflare API, which would then deploy it globally, so that it could run anywhere. That's not what we want for Agents! We want the code to just run right where the agent is.
            - paragraph [ref=e201]:
              - text: "To that end, we've added a new API to the Workers platform: the"
              - link "Worker Loader API" [ref=e202] [cursor=pointer]:
                - /url: https://developers.cloudflare.com/workers/runtime-apis/bindings/worker-loader/
              - text: ". With it, you can load Worker code on-demand. Here's what it looks like:"
            - code [ref=e204]: "// Gets the Worker with the given ID, creating it if no such Worker exists yet. let worker = env.LOADER.get(id, async () => { // If the Worker does not already exist, this callback is invoked to fetch // its code. return { compatibilityDate: \"2025-06-01\", // Specify the worker's code (module files). mainModule: \"foo.js\", modules: { \"foo.js\": \"export default {\\n\" + \" fetch(req, env, ctx) { return new Response('Hello'); }\\n\" + \"}\\n\", }, // Specify the dynamic Worker's environment (`env`). env: { // It can contain basic serializable data types... SOME_NUMBER: 123, // ... and bindings back to the parent worker's exported RPC // interfaces, using the new `ctx.exports` loopback bindings API. SOME_RPC_BINDING: ctx.exports.MyBindingImpl({props}) }, // Redirect the Worker's `fetch()` and `connect()` to proxy through // the parent worker, to monitor or filter all Internet access. You // can also block Internet access completely by passing `null`. globalOutbound: ctx.exports.OutboundProxy({props}), }; }); // Now you can get the Worker's entrypoint and send requests to it. let defaultEntrypoint = worker.getEntrypoint(); await defaultEntrypoint.fetch(\"http://example.com\"); // You can get non-default entrypoints as well, and specify the // `ctx.props` value to be delivered to the entrypoint. let someEntrypoint = worker.getEntrypoint(\"SomeEntrypointClass\", { props: {someProp: 123} });"
            - paragraph [ref=e205]:
              - text: You can start playing with this API right now when running
              - code [ref=e206]: workerd
              - text: locally with Wrangler (
              - link "check out the docs" [ref=e207] [cursor=pointer]:
                - /url: https://developers.cloudflare.com/workers/runtime-apis/bindings/worker-loader/
              - text: ), and you can
              - link "sign up for beta access" [ref=e208] [cursor=pointer]:
                - /url: https://forms.gle/MoeDxE9wNiqdf8ri9
              - text: to use it in production.
            - generic [ref=e209]:
              - heading "Workers are better sandboxes" [level=2] [ref=e210]
              - link [ref=e211] [cursor=pointer]:
                - /url: "#workers-are-better-sandboxes"
            - paragraph [ref=e214]: "The design of Workers makes it unusually good at sandboxing, especially for this use case, for a few reasons:"
            - generic [ref=e215]:
              - heading "Faster, cheaper, disposable sandboxes" [level=3] [ref=e216]
              - link [ref=e217] [cursor=pointer]:
                - /url: "#faster-cheaper-disposable-sandboxes"
            - paragraph [ref=e220]:
              - link "The Workers platform uses isolates instead of containers." [ref=e221] [cursor=pointer]:
                - /url: https://developers.cloudflare.com/workers/reference/how-workers-works/
              - text: Isolates are much lighter-weight and faster to start up. It takes mere milliseconds to start a fresh isolate, and it's so cheap we can just create a new one for every single code snippet the agent generates. There's no need to worry about pooling isolates for reuse, prewarming, etc.
            - paragraph [ref=e222]: We have not yet finalized pricing for the Worker Loader API, but because it is based on isolates, we will be able to offer it at a significantly lower cost than container-based solutions.
            - generic [ref=e223]:
              - heading "Isolated by default, but connected with bindings" [level=3] [ref=e224]
              - link [ref=e225] [cursor=pointer]:
                - /url: "#isolated-by-default-but-connected-with-bindings"
            - paragraph [ref=e228]: Workers are just better at handling isolation.
            - paragraph [ref=e229]:
              - text: In Code Mode, we prohibit the sandboxed worker from talking to the Internet. The global
              - code [ref=e230]: fetch()
              - text: and
              - code [ref=e231]: connect()
              - text: functions throw errors.
            - paragraph [ref=e232]: But on most platforms, this would be a problem. On most platforms, the way you get access to private resources is, you start with general network access. Then, using that network access, you send requests to specific services, passing them some sort of API key to authorize private access.
            - paragraph [ref=e233]:
              - text: But Workers has always had a better answer. In Workers, the "environment" (
              - code [ref=e234]: env
              - text: object) doesn't just contain strings,
              - link "it contains live objects" [ref=e235] [cursor=pointer]:
                - /url: https://blog.cloudflare.com/workers-environment-live-object-bindings/
              - text: ", also known as \"bindings\". These objects can provide direct access to private resources without involving generic network requests."
            - paragraph [ref=e236]: In Code Mode, we give the sandbox access to bindings representing the MCP servers it is connected to. Thus, the agent can specifically access those MCP servers without having network access in general.
            - paragraph [ref=e237]: "Limiting access via bindings is much cleaner than doing it via, say, network-level filtering or HTTP proxies. Filtering is hard on both the LLM and the supervisor, because the boundaries are often unclear: the supervisor may have a hard time identifying exactly what traffic is legitimately necessary to talk to an API. Meanwhile, the LLM may have difficulty guessing what kinds of requests will be blocked. With the bindings approach, it's well-defined: the binding provides a JavaScript interface, and that interface is allowed to be used. It's just better this way."
            - generic [ref=e238]:
              - heading "No API keys to leak" [level=3] [ref=e239]
              - link [ref=e240] [cursor=pointer]:
                - /url: "#no-api-keys-to-leak"
            - paragraph [ref=e243]: An additional benefit of bindings is that they hide API keys. The binding itself provides an already-authorized client interface to the MCP server. All calls made on it go to the agent supervisor first, which holds the access tokens and adds them into requests sent on to MCP.
            - paragraph [ref=e244]: This means that the AI cannot possibly write code that leaks any keys, solving a common security problem seen in AI-authored code today.
            - generic [ref=e245]:
              - heading "Try it now!" [level=2] [ref=e246]
              - link [ref=e247] [cursor=pointer]:
                - /url: "#try-it-now"
            - generic [ref=e250]:
              - heading "Sign up for the production beta" [level=3] [ref=e251]
              - link [ref=e252] [cursor=pointer]:
                - /url: "#sign-up-for-the-production-beta"
            - paragraph [ref=e255]:
              - text: The Dynamic Worker Loader API is in closed beta. To use it in production,
              - link "sign up today" [ref=e256] [cursor=pointer]:
                - /url: https://forms.gle/MoeDxE9wNiqdf8ri9
              - text: .
            - generic [ref=e257]:
              - heading "Or try it locally" [level=3] [ref=e258]
              - link [ref=e259] [cursor=pointer]:
                - /url: "#or-try-it-locally"
            - paragraph [ref=e262]:
              - text: If you just want to play around, though, Dynamic Worker Loading is fully available today when developing locally with Wrangler and
              - code [ref=e263]: workerd
              - text: – check out the docs for
              - link "Dynamic Worker Loading" [ref=e264] [cursor=pointer]:
                - /url: https://developers.cloudflare.com/workers/runtime-apis/bindings/worker-loader/
              - text: and
              - link "code mode in the Agents SDK" [ref=e265] [cursor=pointer]:
                - /url: https://github.com/cloudflare/agents/blob/main/docs/codemode.md
              - text: to get started.
