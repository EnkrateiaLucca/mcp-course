      - generic [ref=f1e36]:
        - 'heading "Code execution with MCP: Building more efficient agents" [level=1] [ref=f1e39]'
        - generic [ref=f1e40]:
          - paragraph [ref=f1e41]: Published Nov 04, 2025
          - paragraph [ref=f1e42]: Direct tool calls consume context for each definition and result. Agents scale better by writing code to call tools instead. Here's how it works with MCP.
    - generic [ref=f1e43]:
      - article [ref=f1e44]:
        - generic [ref=f1e46]:
          - paragraph [ref=f1e47]:
            - link "The Model Context Protocol (MCP)" [ref=f1e48] [cursor=pointer]:
              - /url: https://modelcontextprotocol.io/
            - text: is an open standard for connecting AI agents to external systems. Connecting agents to tools and data traditionally requires a custom integration for each pairing, creating fragmentation and duplicated effort that makes it difficult to scale truly connected systems. MCP provides a universal protocol—developers implement MCP once in their agent and it unlocks an entire ecosystem of integrations.
          - paragraph [ref=f1e49]:
            - text: "Since launching MCP in November 2024, adoption has been rapid: the community has built thousands of"
            - link "MCP servers" [ref=f1e50] [cursor=pointer]:
              - /url: https://github.com/modelcontextprotocol/servers
            - text: ","
            - link "SDKs" [ref=f1e51] [cursor=pointer]:
              - /url: https://modelcontextprotocol.io/docs/sdk
            - text: are available for all major programming languages, and the industry has adopted MCP as the de-facto standard for connecting agents to tools and data.
          - paragraph [ref=f1e52]: Today developers routinely build agents with access to hundreds or thousands of tools across dozens of MCP servers. However, as the number of connected tools grows, loading all tool definitions upfront and passing intermediate results through the context window slows down agents and increases costs.
          - paragraph [ref=f1e53]: In this blog we'll explore how code execution can enable agents to interact with MCP servers more efficiently, handling more tools while using fewer tokens.
          - heading [level=2] [ref=f1e54]:
            - strong [ref=f1e55]: Excessive token consumption from tools makes agents less efficient
          - paragraph [ref=f1e56]: "As MCP usage scales, there are two common patterns that can increase agent cost and latency:"
          - list [ref=f1e57]:
            - listitem [ref=f1e58]: Tool definitions overload the context window;
            - listitem [ref=f1e59]: Intermediate tool results consume additional tokens.
          - heading [level=3] [ref=f1e60]:
            - strong [ref=f1e61]: 1. Tool definitions overload the context window
          - paragraph [ref=f1e62]: "Most MCP clients load all tool definitions upfront directly into context, exposing them to the model using a direct tool-calling syntax. These tool definitions might look like:"
          - generic [ref=f1e64]:
            - code [ref=f1e66]: "gdrive.getDocument Description: Retrieves a document from Google Drive Parameters: documentId (required, string): The ID of the document to retrieve fields (optional, string): Specific fields to return Returns: Document object with title, body content, metadata, permissions, etc."
            - button "Copy code" [ref=f1e68] [cursor=pointer]:
              - generic [ref=f1e71]: Copy
          - generic [ref=f1e73]:
            - code [ref=f1e75]: "salesforce.updateRecord Description: Updates a record in Salesforce Parameters: objectType (required, string): Type of Salesforce object (Lead, Contact, Account, etc.) recordId (required, string): The ID of the record to update data (required, object): Fields to update with their new values Returns: Updated record object with confirmation"
            - button "Copy code" [ref=f1e77] [cursor=pointer]:
              - generic [ref=f1e80]: Copy
          - paragraph [ref=f1e81]: Tool descriptions occupy more context window space, increasing response time and costs. In cases where agents are connected to thousands of tools, they’ll need to process hundreds of thousands of tokens before reading a request.
          - heading [level=3] [ref=f1e82]:
            - strong [ref=f1e83]: 2. Intermediate tool results consume additional tokens
          - paragraph [ref=f1e84]: "Most MCP clients allow models to directly call MCP tools. For example, you might ask your agent: \"Download my meeting transcript from Google Drive and attach it to the Salesforce lead.\""
          - paragraph [ref=f1e85]: "The model will make calls like:"
          - generic [ref=f1e87]:
            - code [ref=f1e89]: "TOOL CALL: gdrive.getDocument(documentId: \"abc123\") → returns \"Discussed Q4 goals...\\n[full transcript text]\" (loaded into model context) TOOL CALL: salesforce.updateRecord( objectType: \"SalesMeeting\", recordId: \"00Q5f000001abcXYZ\", data: { \"Notes\": \"Discussed Q4 goals...\\n[full transcript text written out]\" } ) (model needs to write entire transcript into context again)"
            - button "Copy code" [ref=f1e91] [cursor=pointer]:
              - generic [ref=f1e94]: Copy
          - paragraph [ref=f1e95]: Every intermediate result must pass through the model. In this example, the full call transcript flows through twice. For a 2-hour sales meeting, that could mean processing an additional 50,000 tokens. Even larger documents may exceed context window limits, breaking the workflow.
          - paragraph [ref=f1e96]: With large documents or complex data structures, models may be more likely to make mistakes when copying data between tool calls.
          - figure "The MCP client loads tool definitions into the model's context window and orchestrates a message loop where each tool call and result passes through the model between operations." [ref=f1e98]:
            - img "Image of how the MCP client works with the MCP server and LLM." [ref=f1e99]
          - heading [level=2] [ref=f1e101]:
            - strong [ref=f1e102]: Code execution with MCP improves context efficiency
          - paragraph [ref=f1e103]: "With code execution environments becoming more common for agents, a solution is to present MCP servers as code APIs rather than direct tool calls. The agent can then write code to interact with MCP servers. This approach addresses both challenges: agents can load only the tools they need and process data in the execution environment before passing results back to the model."
          - paragraph [ref=f1e104]: "There are a number of ways to do this. One approach is to generate a file tree of all available tools from connected MCP servers. Here's an implementation using TypeScript:"
          - generic [ref=f1e106]:
            - code [ref=f1e108]: servers ├── google-drive │ ├── getDocument.ts │ ├── ... (other tools) │ └── index.ts ├── salesforce │ ├── updateRecord.ts │ ├── ... (other tools) │ └── index.ts └── ... (other servers)
            - button "Copy code" [ref=f1e110] [cursor=pointer]:
              - generic [ref=f1e113]: Copy
          - paragraph [ref=f1e114]: "Then each tool corresponds to a file, something like:"
          - generic [ref=f1e116]:
            - code [ref=f1e118]: "// ./servers/google-drive/getDocument.ts import { callMCPTool } from \"../../../client.js\"; interface GetDocumentInput { documentId: string; } interface GetDocumentResponse { content: string; } /* Read a document from Google Drive */ export async function getDocument(input: GetDocumentInput): Promise<GetDocumentResponse> { return callMCPTool<GetDocumentResponse>('google_drive__get_document', input); }"
            - button "Copy code" [ref=f1e120] [cursor=pointer]:
              - generic [ref=f1e123]: Copy
          - paragraph [ref=f1e124]: "Our Google Drive to Salesforce example above becomes the code:"
          - generic [ref=f1e126]:
            - code [ref=f1e128]: "// Read transcript from Google Docs and add to Salesforce prospect import * as gdrive from './servers/google-drive'; import * as salesforce from './servers/salesforce'; const transcript = (await gdrive.getDocument({ documentId: 'abc123' })).content; await salesforce.updateRecord({ objectType: 'SalesMeeting', recordId: '00Q5f000001abcXYZ', data: { Notes: transcript } });"
            - button "Copy code" [ref=f1e130] [cursor=pointer]:
              - generic [ref=f1e133]: Copy
          - paragraph [ref=f1e134]:
            - text: "The agent discovers tools by exploring the filesystem: listing the"
            - code [ref=f1e135]: ./servers/
            - text: directory to find available servers (like
            - code [ref=f1e136]: google-drive
            - text: and
            - code [ref=f1e137]: salesforce
            - text: ), then reading the specific tool files it needs (like
            - code [ref=f1e138]: getDocument.ts
            - text: and
            - code [ref=f1e139]: updateRecord.ts
            - text: ) to understand each tool's interface. This lets the agent load only the definitions it needs for the current task. This reduces the token usage from 150,000 tokens to 2,000 tokens—a time and cost saving of 98.7%
            - strong [ref=f1e140]: .
          - paragraph [ref=f1e141]:
            - text: Cloudflare
            - link "published similar findings" [ref=f1e142] [cursor=pointer]:
              - /url: https://blog.cloudflare.com/code-mode/
            - text: ", referring to code execution with MCP as “Code Mode.\" The core insight is the same: LLMs are adept at writing code and developers should take advantage of this strength to build agents that interact with MCP servers more efficiently."
          - heading [level=2] [ref=f1e143]:
            - strong [ref=f1e144]: Benefits of code execution with MCP
          - paragraph [ref=f1e145]: Code execution with MCP enables agents to use context more efficiently by loading tools on demand, filtering data before it reaches the model, and executing complex logic in a single step. There are also security and state management benefits to using this approach.
          - heading "Progressive disclosure" [level=3] [ref=f1e146]
          - paragraph [ref=f1e147]: Models are great at navigating filesystems. Presenting tools as code on a filesystem allows models to read tool definitions on-demand, rather than reading them all up-front.
          - paragraph [ref=f1e148]:
            - text: Alternatively, a
            - code [ref=f1e149]: search_tools
            - text: tool can be added to the server to find relevant definitions. For example, when working with the hypothetical Salesforce server used above, the agent searches for "salesforce" and loads only those tools that it needs for the current task. Including a detail level parameter in the
            - code [ref=f1e150]: search_tools
            - text: tool that allows the agent to select the level of detail required (such as name only, name and description, or the full definition with schemas) also helps the agent conserve context and find tools efficiently.
          - heading "Context efficient tool results" [level=3] [ref=f1e151]
          - paragraph [ref=f1e152]: "When working with large datasets, agents can filter and transform results in code before returning them. Consider fetching a 10,000-row spreadsheet:"
          - generic [ref=f1e154]:
            - code [ref=f1e156]: "// Without code execution - all rows flow through context TOOL CALL: gdrive.getSheet(sheetId: 'abc123') → returns 10,000 rows in context to filter manually // With code execution - filter in the execution environment const allRows = await gdrive.getSheet({ sheetId: 'abc123' }); const pendingOrders = allRows.filter(row => row[\"Status\"] === 'pending' ); console.log(`Found ${pendingOrders.length} pending orders`); console.log(pendingOrders.slice(0, 5)); // Only log first 5 for review"
            - button "Copy code" [ref=f1e158] [cursor=pointer]:
              - generic [ref=f1e161]: Copy
          - paragraph [ref=f1e162]: The agent sees five rows instead of 10,000. Similar patterns work for aggregations, joins across multiple data sources, or extracting specific fields—all without bloating the context window.
          - heading [level=4] [ref=f1e163]:
            - strong [ref=f1e164]: More powerful and context-efficient control flow
          - paragraph [ref=f1e165]: "Loops, conditionals, and error handling can be done with familiar code patterns rather than chaining individual tool calls. For example, if you need a deployment notification in Slack, the agent can write:"
          - generic [ref=f1e167]:
            - code [ref=f1e169]: "let found = false; while (!found) { const messages = await slack.getChannelHistory({ channel: 'C123456' }); found = messages.some(m => m.text.includes('deployment complete')); if (!found) await new Promise(r => setTimeout(r, 5000)); } console.log('Deployment notification received');"
            - button "Copy code" [ref=f1e171] [cursor=pointer]:
              - generic [ref=f1e174]: Copy
          - paragraph [ref=f1e175]: This approach is more efficient than alternating between MCP tool calls and sleep commands through the agent loop.
          - paragraph [ref=f1e176]: "Additionally, being able to write out a conditional tree that gets executed also saves on “time to first token” latency: rather than having to wait for a model to evaluate an if-statement, the agent can let the code execution environment do this."
          - heading "Privacy-preserving operations" [level=3] [ref=f1e177]
          - paragraph [ref=f1e178]: When agents use code execution with MCP, intermediate results stay in the execution environment by default. This way, the agent only sees what you explicitly log or return, meaning data you don’t wish to share with the model can flow through your workflow without ever entering the model's context.
          - paragraph [ref=f1e179]: "For even more sensitive workloads, the agent harness can tokenize sensitive data automatically. For example, imagine you need to import customer contact details from a spreadsheet into Salesforce. The agent writes:"
          - generic [ref=f1e181]:
            - code [ref=f1e183]: "const sheet = await gdrive.getSheet({ sheetId: 'abc123' }); for (const row of sheet.rows) { await salesforce.updateRecord({ objectType: 'Lead', recordId: row.salesforceId, data: { Email: row.email, Phone: row.phone, Name: row.name } }); } console.log(`Updated ${sheet.rows.length} leads`);"
            - button "Copy code" [ref=f1e185] [cursor=pointer]:
              - generic [ref=f1e188]: Copy
          - paragraph [ref=f1e189]: "The MCP client intercepts the data and tokenizes PII before it reaches the model:"
          - generic [ref=f1e191]:
            - code [ref=f1e193]: "// What the agent would see, if it logged the sheet.rows: [ { salesforceId: '00Q...', email: '[EMAIL_1]', phone: '[PHONE_1]', name: '[NAME_1]' }, { salesforceId: '00Q...', email: '[EMAIL_2]', phone: '[PHONE_2]', name: '[NAME_2]' }, ... ]"
            - button "Copy code" [ref=f1e195] [cursor=pointer]:
              - generic [ref=f1e198]: Copy
          - paragraph [ref=f1e199]: Then, when the data is shared in another MCP tool call, it is untokenized via a lookup in the MCP client. The real email addresses, phone numbers, and names flow from Google Sheets to Salesforce, but never through the model. This prevents the agent from accidentally logging or processing sensitive data. You can also use this to define deterministic security rules, choosing where data can flow to and from.
          - heading "State persistence and skills" [level=3] [ref=f1e200]
          - paragraph [ref=f1e201]: "Code execution with filesystem access allows agents to maintain state across operations. Agents can write intermediate results to files, enabling them to resume work and track progress:"
          - generic [ref=f1e203]:
            - code [ref=f1e205]: "const leads = await salesforce.query({ query: 'SELECT Id, Email FROM Lead LIMIT 1000' }); const csvData = leads.map(l => `${l.Id},${l.Email}`).join('\\n'); await fs.writeFile('./workspace/leads.csv', csvData); // Later execution picks up where it left off const saved = await fs.readFile('./workspace/leads.csv', 'utf-8');"
            - button "Copy code" [ref=f1e207] [cursor=pointer]:
              - generic [ref=f1e210]: Copy
          - paragraph [ref=f1e211]: "Agents can also persist their own code as reusable functions. Once an agent develops working code for a task, it can save that implementation for future use:"
          - generic [ref=f1e213]:
            - code [ref=f1e215]: "// In ./skills/save-sheet-as-csv.ts import * as gdrive from './servers/google-drive'; export async function saveSheetAsCsv(sheetId: string) { const data = await gdrive.getSheet({ sheetId }); const csv = data.map(row => row.join(',')).join('\\n'); await fs.writeFile(`./workspace/sheet-${sheetId}.csv`, csv); return `./workspace/sheet-${sheetId}.csv`; } // Later, in any agent execution: import { saveSheetAsCsv } from './skills/save-sheet-as-csv'; const csvPath = await saveSheetAsCsv('abc123');"
            - button "Copy code" [ref=f1e217] [cursor=pointer]:
              - generic [ref=f1e220]: Copy
          - paragraph [ref=f1e221]:
            - text: This ties in closely to the concept of
            - link "Skills" [ref=f1e222] [cursor=pointer]:
              - /url: https://docs.claude.com/en/docs/agents-and-tools/agent-skills/overview
            - text: ", folders of reusable instructions, scripts, and resources for models to improve performance on specialized tasks. Adding a SKILL.md file to these saved functions creates a structured skill that models can reference and use. Over time, this allows your agent to build a toolbox of higher-level capabilities, evolving the scaffolding that it needs to work most effectively."
          - paragraph [ref=f1e223]:
            - text: Note that code execution introduces its own complexity. Running agent-generated code requires a secure execution environment with appropriate
            - link "sandboxing" [ref=f1e224] [cursor=pointer]:
              - /url: https://www.anthropic.com/engineering/claude-code-sandboxing
            - text: ", resource limits, and monitoring. These infrastructure requirements add operational overhead and security considerations that direct tool calls avoid. The benefits of code execution—reduced token costs, lower latency, and improved tool composition—should be weighed against these implementation costs."
          - heading [level=2] [ref=f1e225]:
            - strong [ref=f1e226]: Summary
          - paragraph [ref=f1e227]: MCP provides a foundational protocol for agents to connect to many tools and systems. However, once too many servers are connected, tool definitions and results can consume excessive tokens, reducing agent efficiency.
          - paragraph [ref=f1e228]:
            - text: Although many of the problems here feel novel—context management, tool composition, state persistence—they have known solutions from software engineering. Code execution applies these established patterns to agents, letting them use familiar programming constructs to interact with MCP servers more efficiently. If you implement this approach, we encourage you to share your findings with the
            - link "MCP community" [ref=f1e229] [cursor=pointer]:
              - /url: https://modelcontextprotocol.io/community/communication
            - text: .
          - heading "Acknowledgments" [level=3] [ref=f1e230]
          - paragraph [ref=f1e231]:
            - emphasis [ref=f1e232]: This article was written by Adam Jones and Conor Kelly. Thanks to Jeremy Fox, Jerome Swannack, Stuart Ritchie, Molly Vorwerck, Matt Samuels, and Maggie Vo for feedback on drafts of this post.
